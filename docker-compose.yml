services:
  postgres:
    image : postgres:16
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_USER=praveen
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    ports:
    - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    
  http-server:
    build:
      context: .
      dockerfile: apps/http-server/Dockerfile
    container_name: http-server
    ports:
    - "3000:3000"
    environment:
      DATABASE_URL: postgresql://praveen:password@postgres:5432/mydb?schema=public
    depends_on:
    - postgres
  
  ws-server:
    build:
      context: .
      dockerfile: apps/ws-server/Dockerfile
    container_name: ws-server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://praveen:password@postgres:5432/mydb?schema=public
    depends_on:
      - postgres
    
  web-app:
    build:
      context: .
      dockerfile : apps/web/Dockerfile
    container_name : web
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://praveen:password@postgres:5432/mydb?schema=public
    depends_on:
      - ws-server
      - http-server


volumes:
  pgdata:  